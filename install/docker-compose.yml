# Tüze CRM — Müşteri kurulumu için Docker Compose
#
# Bu dosya yalnızca Docker Hub'dan imaj çeker; build yapmaz.
# Geliştirici makinesindeki ana docker-compose.yml'den farklı olarak
# `build:` blokları yoktur — image-only deployment.
#
# Güncelleme:
#   - Uygulama içinden: Ayarlar > Güncelleme > "Şimdi Güncelle"
#   - Manuel: docker compose pull && docker compose up -d
#
# Yedek alma:
#   - Veritabanı: docker exec tuze_postgres pg_dump -U tuze tuze > yedek.sql
#   - Yüklenen dosyalar: uploads/ klasörünü kopyalayın

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tuze_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tuze}
      POSTGRES_USER: ${POSTGRES_USER:-tuze}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tuze_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tuze}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: tuze_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  backend:
    image: signorali/tuze-backend:${APP_VERSION:-latest}
    container_name: tuze_backend
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
      # Update sistemi: backend Docker daemon'a erişir → docker pull / recreate
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  celery:
    image: signorali/tuze-backend:${APP_VERSION:-latest}
    container_name: tuze_celery
    command: celery -A app.workers.celery_app worker --pool=solo --loglevel=info
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  celery-beat:
    image: signorali/tuze-backend:${APP_VERSION:-latest}
    container_name: tuze_celery_beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped
    logging: *default-logging

  report:
    image: signorali/tuze-report:${APP_VERSION:-latest}
    container_name: tuze_report
    restart: unless-stopped
    logging: *default-logging

  frontend:
    image: signorali/tuze-frontend:${APP_VERSION:-latest}
    container_name: tuze_frontend
    restart: unless-stopped
    logging: *default-logging

  nginx:
    image: nginx:alpine
    container_name: tuze_nginx
    ports:
      - "${HTTP_PORT:-9090}:80"
      - "${HTTPS_PORT:-9443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    logging: *default-logging

volumes:
  postgres_data:
    name: tuze_postgres_data
  redis_data:
    name: tuze_redis_data
