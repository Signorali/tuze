worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 25M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Docker'ın gömülü DNS'i — her istekte servis adını yeniden çözümler
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 80;
        server_name _;

        # Yüklenen dosyalar (logolar vb.)
        location /uploads/ {
            set $backend_host backend:8000;
            proxy_pass http://$backend_host;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Factory reset — uzun sürebilir, ayrı timeout
        location /api/setup/factory-reset {
            set $backend_host backend:8000;
            proxy_pass http://$backend_host;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
        }

        # API
        location /api/ {
            set $backend_host backend:8000;
            proxy_pass http://$backend_host;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Report service (Carbone)
        location /report/ {
            set $report_host report:3001;
            rewrite ^/report/(.*) /$1 break;
            proxy_pass http://$report_host;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }

        # Frontend (production: nginx → frontend container'da 'serve' statik dosyaları)
        location / {
            set $frontend_host frontend:3000;
            proxy_pass http://$frontend_host;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
